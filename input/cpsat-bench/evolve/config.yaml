# Single config for cpsat-bench. Read by openevolve (dacite, ignores unknown
# top-level keys like `bench` / `parallel_solvers`) AND by input/run_phase.sh
# (via _lib/load_bench_config.py) for shell-side phase orchestration.
#
# === bench: section ===
# Consumed by input/run_phase.sh. phases[].iters can be null/omitted → uses
# max_iterations below.
bench:
  phases:
    - dir: phase1_search
      iters: 40
    - dir: phase2_presolve
      iters: 40
    - dir: phase3_lp_cuts
      iters: 40
    - dir: phase4_unified
      iters: 40
  unified_prepare_script: prepare_phase_unified.py
  solver_check_cmd: 'python -c "from ortools.sat.python import cp_model"'
  solver_install_hint: "install: pip install ortools"
  # optional script-name overrides (defaults shown):
  # rebaseline_script: rebaseline_local.py
  # extract_best_script: extract_best.py
  # build_samples_script: build_samples.py

# === Custom cpsat-bench knobs (silently ignored by openevolve dacite) ===
# parallel_solvers: total concurrent CP-SAT worker subprocesses per stage.
#   - Read by shared/evaluator.py, rebaseline_local.py, baseline_params self-test.
#   - Sets the FALLBACK core-pool size when OPENEVOLVE_CORE_RANGE is unset
#     (cores 1..parallel_solvers; core 0 reserved for kernel housekeeping).
#   - Effective concurrency = len(core_pool) // num_search_workers (floor).
#     A solve with workers=8 on a 6-core pool runs sequentially (1 block);
#     a phase with workers=1 on a 6-core pool runs 6-way parallel.
#   - Env OPENEVOLVE_PARALLEL_SOLVERS overrides this value.
parallel_solvers: 8

max_iterations: 40
checkpoint_interval: 10
log_level: "INFO"
random_seed: 42

diff_based_evolution: true
max_code_length: 20000

early_stopping_patience: null
convergence_threshold: 0.001
early_stopping_metric: "combined_score"

llm:
  models:
    - name: "claude-sonnet-4-6"
      provider: "claude_code"
      weight: 0.8
      timeout: 180
      retries: 2
      retry_delay: 10
      reasoning_effort: "medium"
    - name: "claude-haiku-4-5"
      provider: "claude_code"
      weight: 0.2
      timeout: 120

prompt:
  system_message: |
    You tune OR-tools CP-SAT (ortools.sat.python.cp_model) solver parameters for a
    workload of 85 OPTIMAL-objective instances stored as serialized CpModelProto
    (problem.cpsat.pb). Median baseline runtime ≈ 4.6s, max ≈ 107s.

    The initial_program.py exposes an EVOLVE-BLOCK dict (per phase:
    search/subsolvers, presolve, lp/cuts, or unified). Your job is to mutate
    this dict to MAXIMIZE combined_score = geomean(cost_ratio * time_ratio)
    * solved_rate^2 * efficiency^STATS_WEIGHT.

    Score mode = cost: variant must reach OPTIMAL or FEASIBLE on every baseline
    OPTIMAL problem, otherwise the per-problem ratio is 1e-6 (large penalty,
    geomean punishes one regression heavily). All baselines are OPTIMAL, so a
    variant that bails to FEASIBLE with a worse objective_value scores below 1.0.

    Hard rules:
      - Do NOT modify locked keys: random_seed, num_search_workers, timeout_sec.
        (evaluator returns combined_score=0 + locked_violated artifact on violation.)
        num_search_workers is pinned PER PHASE by the phase's PHASE_LOCKED:
          phase1/2: num_search_workers=1 (single-worker, no subsolver mix)
          phase3/4: num_search_workers=8 (multi-worker, subsolver mix engaged)
        get_params() re-applies PHASE_LOCKED last so phase1/2 inherited dicts
        don't leak a higher worker count into a lower-worker phase.
      - Use only valid CpSolverParameters proto field names. Unknown keys
        cause AttributeError → evaluator returns 0 + surfaces invalid_param.
      - Respect types: bool true/false, int, float, list of strings (subsolver names).
      - Repeated proto fields (extra_subsolvers, ignore_subsolvers, etc.) accept
        Python lists; the worker handles del+extend internally.
      - Subsolver-mix keys (extra_subsolvers, ignore_subsolvers, diversify_lns_params,
        repair_hint, use_feasibility_jump/pump) only meaningfully fire when
        num_search_workers > 1 — they are most impactful in phase 3 and beyond.

    Common CP-SAT knobs worth exploring (non-exhaustive):
      search/subsolvers:
        extra_subsolvers, ignore_subsolvers — subsolver names include
          "default_lp", "no_lp", "max_lp", "core", "quick_restart",
          "reduced_costs", "lb_tree_search", "probing_search", "objective_lb_search",
          "objective_shaving_search_no_lp", "pseudo_costs", "fixed",
          "feasibility_pump", "feasibility_jump"
        interleave_search: bool
        use_feasibility_jump, use_feasibility_pump: bool
        diversify_lns_params: bool
        repair_hint: bool
      presolve/probing:
        cp_model_probing_level: 0..3
        cp_model_presolve: bool
        presolve_use_bva: bool
        presolve_bve_threshold: int
        symmetry_level: 0..3
        tuned: bool (preset bundle — usually leave true)
      lp/cuts:
        linearization_level: 0..2
        cut_level: 0..2
        max_num_cuts: int (1000-10000 typical)
        add_mir_cuts, add_zero_half_cuts, add_clique_cuts: bool
        new_constraints_batch_size: int
        mip_max_bound, mip_var_scaling, mip_check_precision, mip_drop_tolerance: numeric

    Per-round artifacts show speedup, regression, base_obj vs obj for each problem.
    Read them: which knob change helped the long Q5 problems vs the fast Q1 ones?
    Watch num_conflicts and num_branches — a 2x speedup with same conflict count
    is hardware noise; a 2x with 10x fewer conflicts is a real find.

    Per-problem param resolution (NEW): get_params(problem=None, stage=None).
    Three evolution surfaces per phase:
      GLOBAL_OVERRIDES   — every problem
      SIZE_BUCKETS       — list[(upper_exclusive_num_constraints, dict)];
                           first match wins. small/mid/large = <50k / 50–150k / ≥150k.
      STAGE3_OVERRIDES   — applied ONLY when stage == "stage3" AND
                           problem["is_outlier"] (residual outliers from
                           Statistics/outliers_top.csv). Tune aggressive knobs
                           that help long-tail problems without regressing the
                           fast/mid groups (those score stage1/2 and reject the
                           candidate before stage3 ever runs).

    Stage layout in cascade:
      stage1 (5)  fast cluster centers       — must not regress
      stage2 (5)  mid  cluster centers       — must not regress
      stage3 (5)  OUTLIER problems only      — STAGE3_OVERRIDES active here
      stage4 (20) broad spread               — final score

    Outliers (~30 of 430 problems) have ~80x more conflicts, ~13x more branches
    vs baseline median (see Statistics/outliers_report.txt). Two clusters:
    small (<50k constraints, hard small SAT-like) and large (>=150k, LP-heavy).
    Mid bucket has 0 outliers. So SIZE_BUCKETS small/large entries pair well
    with STAGE3_OVERRIDES.

    === CP-SAT CpSolverParameters Reference (ortools 9.14.6206) ===
    Authoritative field list (275 fields). Use ONLY these names in get_params().
    Defaults shown; setattr-compatible via cp_model.CpSolver().parameters.

    parallel/workers:
      diversify_lns_params(bool=F), extra_subsolvers(list<str>),
      filter_subsolvers(list<str>), ignore_subsolvers(list<str>),
      interleave_search(bool=F), lb_relax_num_workers_threshold(int=16),
      log_subsolver_statistics(bool=F), num_full_subsolvers(int=0),
      num_search_workers(int=0)*LOCKED, num_workers(int=0),
      share_binary_clauses(bool=T), share_glue_clauses(bool=F),
      share_glue_clauses_dtime(double=1.0), share_level_zero_bounds(bool=T),
      share_objective_bounds(bool=T), shared_tree_num_workers(int=0),
      subsolvers(list<str>), use_objective_lb_search(bool=F)

    seed/reproducibility:
      ignore_names(bool=T), instantiate_all_variables(bool=T),
      lns_initial_deterministic_limit(double=0.1),
      log_search_progress(bool=F), max_deterministic_time(double=inf),
      max_num_deterministic_batches(int=0),
      permute_presolve_constraint_order(bool=F),
      permute_variable_randomly(bool=F),
      presolve_probing_deterministic_time_limit(double=30.0),
      probing_deterministic_time_limit(double=1.0),
      random_seed(int=1)*LOCKED,
      shaving_deterministic_time_in_probing_search(double=0.001),
      shaving_search_deterministic_time(double=0.1),
      symmetry_detection_deterministic_time_limit(double=1.0)

    timeout/limits:
      max_memory_in_mb(int64=10000), max_number_of_conflicts(int64=∞),
