      stop_after_first_solution(bool=F), stop_after_presolve(bool=F),
      stop_after_root_propagation(bool=F)

    search/branching:
      boolean_encoding_level(int=1), fix_variables_to_their_hinted_value(bool=F),
      hint_conflict_limit(int=10),
      initial_polarity(enum=1:{POLARITY_TRUE,POLARITY_FALSE,POLARITY_RANDOM}),
      initial_variables_activity(double=0.0),
      polarity_exploit_ls_hints(bool=F), polarity_rephase_increment(int=1000),
      preferred_variable_order(enum=0:{IN_ORDER,IN_REVERSE_ORDER,IN_RANDOM_ORDER}),
